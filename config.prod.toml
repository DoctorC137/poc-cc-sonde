# cc-sonde — monitoring des apps Clever Cloud de l'orga B.M. CC Demo
# Probe unique appliqué à toutes les apps via la section [[healthcheck_probes.apps]]
# En cas d'échec répété : restart automatique de l'app concernée

[[healthcheck_probes]]
name = "CC Orga Monitor"
interval_seconds = 60
on_failure_command = "clever restart --app ${APP_ID} --org orga_99543bee-f814-43f6-a8f8-3dcb2a1bd4fa"
failure_retries_before_command = 2
request_timeout_seconds = 15
delay_after_success_seconds = 60
delay_after_failure_seconds = 20
delay_after_command_success_seconds = 120

[healthcheck_probes.checks]
expected_status = 200

