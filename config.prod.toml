# cc-sonde — B.M. CC Demo
# Healthcheck probes : monitoring HTTP de toutes les apps de l'orga
# WarpScript probes  : métriques CPU + RAM via Warp 10, auto-scaling cc-scheduler

# ─────────────────────────────────────────────
# HEALTHCHECK PROBES — surveillance HTTP
# Restart automatique après 3 échecs consécutifs
# ─────────────────────────────────────────────

[[healthcheck_probes]]
name = "CC Orga Monitor"
interval_seconds = 60
on_failure_command = "./clever restart --app ${APP_ID} --org orga_99543bee-f814-43f6-a8f8-3dcb2a1bd4fa"
failure_retries_before_command = 2
request_timeout_seconds = 15
delay_after_success_seconds = 60
delay_after_failure_seconds = 20
delay_after_command_success_seconds = 120

[healthcheck_probes.checks]
expected_status = 200

# B.M. TP-Clever (PHP)
[[healthcheck_probes.apps]]
id = "app_4b20da37-de5d-41d3-b462-59d159ee3a5a"
url = "https://app-4b20da37-de5d-41d3-b462-59d159ee3a5a.cleverapps.io/"

# Deploiement Test Vinext (Node)
[[healthcheck_probes.apps]]
id = "app_0575225d-7864-435d-80eb-39f2a78299d3"
url = "https://app-0575225d-7864-435d-80eb-39f2a78299d3.cleverapps.io/"

# WordPress-Bedrock-Example demo (PHP)
[[healthcheck_probes.apps]]
id = "app_d5e96315-863a-42c7-b743-af22eba3d4e3"
url = "https://app-d5e96315-863a-42c7-b743-af22eba3d4e3.cleverapps.io/"

# cc-scheduler répond 401 (protégé par auth) — on vérifie juste qu'il est up
[[healthcheck_probes]]
name = "cc-scheduler up"
interval_seconds = 60
request_timeout_seconds = 15

[healthcheck_probes.checks]
expected_status = 401

[[healthcheck_probes.apps]]
id = "app_4c5caaed-c50b-4eb2-b269-1bda5c4e51af"
url = "https://app-4c5caaed-c50b-4eb2-b269-1bda5c4e51af.cleverapps.io/"

# ─────────────────────────────────────────────
# WARPSCRIPT PROBES — métriques CPU + RAM
# Mode level-based : scale entre 1 et 3 instances de cc-scheduler
#   UP   si CPU > 70 % OU RAM > 80 %
#   DOWN si CPU < 30 % ET RAM < 50 %
# ─────────────────────────────────────────────

[[warpscript_probes]]
name = "cc-scheduler autoscale"
warpscript_file = { cpu = "warpscript/cpu_usage.mc2", ram = "warpscript/ram_usage.mc2" }
interval_seconds = 60
delay_after_upscale   = { upscale = 120, downscale = 60 }
delay_after_downscale = { downscale = 120, upscale = 60 }

[[warpscript_probes.apps]]
id = "app_4c5caaed-c50b-4eb2-b269-1bda5c4e51af"

[warpscript_probes.scaling]
instances = { min = 1, max = 3 }
flavors   = ["XS", "S", "M"]

scale_up_threshold   = { cpu = 70.0, ram = 80.0 }
scale_down_threshold = { cpu = 30.0, ram = 50.0 }

upscale_command   = "./clever scale --app ${APP_ID} --flavor ${FLAVOR} --instances ${INSTANCES} --org orga_99543bee-f814-43f6-a8f8-3dcb2a1bd4fa"
downscale_command = "./clever scale --app ${APP_ID} --flavor ${FLAVOR} --instances ${INSTANCES} --org orga_99543bee-f814-43f6-a8f8-3dcb2a1bd4fa"
