# Example configuration file for POC Sonde
# This file demonstrates various probe configurations

# Example 1: Simple health check with status code verification
[[probes]]
name = "API Health Check"
url = "https://httpbin.org/status/200"
interval_seconds = 60
# Optional: command to execute on failure
on_failure_command = "echo 'API health check failed'"
# Optional: timeout for command execution (default: 30 seconds)
command_timeout_seconds = 30
# Optional: delay after successful check (defaults to interval_seconds)
delay_after_success_seconds = 120
# Optional: delay after failed check for faster retry (defaults to interval_seconds)
delay_after_failure_seconds = 10

[probes.checks]
# Check that the response status is 200
expected_status = 200

# Example 2: Check with body content validation
[[probes]]
name = "JSON API Check"
url = "https://httpbin.org/json"
interval_seconds = 30

[probes.checks]
expected_status = 200
# Check that the response body contains this string
expected_body_contains = "slideshow"

# Example 3: Check with regex pattern matching
[[probes]]
name = "HTML Page Check"
url = "https://httpbin.org/html"
interval_seconds = 120

[probes.checks]
expected_status = 200
# Check that the response body matches this regex pattern
expected_body_regex = "<h1>.*</h1>"

# Example 4: Check with header validation
[[probes]]
name = "Header Validation Check"
url = "https://httpbin.org/response-headers?X-Custom-Header=test-value"
interval_seconds = 45

[probes.checks]
expected_status = 200
# Check that specific headers have expected values

[probes.checks.expected_header]
"X-Custom-Header" = "test-value"

# Example 5: Combined checks (all must pass)
[[probes]]
name = "Comprehensive Check"
url = "https://httpbin.org/get"
interval_seconds = 90
on_failure_command = "logger 'Comprehensive check failed for httpbin.org'"

[probes.checks]
expected_status = 200
expected_body_contains = "httpbin.org"
expected_body_regex = "\"url\":\\s*\"https://httpbin.org/get\""

